<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Muslim Clock</title>

<!-- Tailwind: bundled locally (offline-friendly) -->
<script src="js/tailwind.js"></script>

<!-- Google Fonts: still loaded online for typography. Falls back gracefully. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@500;600;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/screen.css">

<!-- Fallback config when running outside Android (e.g. browser preview). -->
<script>
window.MC_CONFIG = {
    masjid_name: "Masjid Muslim Clock",
    masjid_address: "Jakarta, Indonesia",
    masjid_logo: "",
    location_lat: -6.2,
    location_lng: 106.816666,
    timezone: "Asia/Jakarta",
    calc_method: 20,
    theme_primary: "#0a4ea3",
    theme_accent:  "#f5b301",
    font_display: "Inter",
    font_digital: "Orbitron",
    adzan_message: "Saatnya Waktu Sholat",
    adzan_duration: 600,
    iqomah_duration: 600,
    show_analog: true,
    show_countdown: true,
    layout: "minimal"
};
</script>

<style>
    :root {
        --primary: #0a4ea3;
        --accent:  #f5b301;
        --primary-dark:  color-mix(in srgb, #0a4ea3 60%, black);
        --primary-light: color-mix(in srgb, #0a4ea3 80%, white);
        --accent-shadow: color-mix(in srgb, #f5b301 40%, transparent);
        --font-display: 'Inter', system-ui, sans-serif;
        --font-digital: 'Orbitron', monospace;
    }
    /* Hide host until JS mounts a layout (avoids flash of unstyled content). */
    #layoutHost:empty { display: none; }

    /* Layout-specific styles, scoped via .layout-* root class. */

    .layout-mosque .ornament-pattern {
        background-image:
          radial-gradient(circle at 25% 25%, color-mix(in srgb, var(--accent) 5%, transparent) 0, transparent 25%),
          radial-gradient(circle at 75% 75%, color-mix(in srgb, var(--primary) 8%, transparent) 0, transparent 25%);
    }

    .layout-neon { background: radial-gradient(ellipse at top, #1a1f3a 0%, #050816 60%); }
    .layout-neon::before {
        content: ""; position: absolute; inset: 0; pointer-events: none;
        background:
            repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 40px),
            repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 40px);
    }
    .layout-neon .neon-glow {
        text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent),
                     0 0 40px color-mix(in srgb, var(--accent) 50%, transparent);
    }
    .layout-neon .neon-card {
        background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        backdrop-filter: blur(12px);
        position: relative; overflow: hidden;
    }
    .layout-neon .neon-card::before {
        content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.5;
    }
    .layout-neon .prayer.next {
        border-color: var(--accent);
        background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 15%, transparent), transparent);
        box-shadow: 0 0 0 1px var(--accent), 0 0 30px -5px var(--accent);
    }
    .layout-neon .prayer.next [data-time] {
        color: var(--accent);
        text-shadow: 0 0 10px color-mix(in srgb, var(--accent) 80%, transparent);
    }
    .layout-neon .neon-frame {
        border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px 40px;
        background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(0,0,0,0.2));
        box-shadow: 0 20px 60px -10px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .layout-classic {
        background:
            radial-gradient(circle at 0% 0%, color-mix(in srgb, var(--primary) 25%, transparent), transparent 50%),
            radial-gradient(circle at 100% 100%, color-mix(in srgb, var(--accent) 15%, transparent), transparent 50%),
            #0a0e1f;
    }
    .layout-classic .pattern {
        position: absolute; inset: 0; opacity: 0.06; pointer-events: none;
        background-image:
          repeating-linear-gradient(45deg, var(--accent) 0, var(--accent) 1px, transparent 1px, transparent 30px),
          repeating-linear-gradient(-45deg, var(--accent) 0, var(--accent) 1px, transparent 1px, transparent 30px);
    }
    .layout-classic .ornament-divider {
        display: flex; align-items: center; gap: 16px; color: var(--accent);
    }
    .layout-classic .ornament-divider::before,
    .layout-classic .ornament-divider::after {
        content: ""; flex: 1; height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .layout-classic .prayer-row {
        display: grid; grid-template-columns: 60px 1fr auto 1fr; align-items: center;
        gap: 20px; padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .layout-classic .prayer-row.next {
        background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 8%, transparent), transparent);
    }
    .layout-classic .prayer-row.next .pname { color: var(--accent); }
    .layout-classic .prayer-row.next [data-time] { color: var(--accent); font-weight: 800; }
</style>
</head>
<body
    data-adzan-msg="Saatnya Waktu Sholat"
    data-adzan-dur="600"
    data-iqomah-dur="600"
    data-show-analog="1"
    data-show-countdown="1">

<!-- Mount point for the active layout. clock.js clones a <template> here. -->
<div id="layoutHost"></div>

<!-- Floating settings button — overlays whatever layout is mounted. -->
<button id="gearBtn"
        class="fixed top-4 right-4 z-40 w-10 h-10 rounded-full glass-dark text-white text-lg flex items-center justify-center shadow-soft"
        aria-label="Settings"
        style="display:none;">
    &#9881;
</button>

<!-- Adzan overlay (shared across layouts). -->
<div id="adzanOverlay" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background: rgba(3,7,18,.96); backdrop-filter: blur(6px);">
    <div class="absolute inset-0" style="background: radial-gradient(circle at 30% 30%, color-mix(in srgb, var(--primary) 30%, transparent), transparent 60%), radial-gradient(circle at 70% 70%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 60%);"></div>
    <div class="relative text-center text-white">
        <div class="text-7xl font-black tracking-[10px]" id="ovPrayer" style="color: var(--accent);">MAGHRIB</div>
        <div class="text-7xl font-extrabold mt-4 mb-10" id="ovMsg">Saatnya Waktu Sholat</div>
        <div class="font-digital font-black leading-none tabular-nums text-white" id="ovCount" style="font-size: 14rem;">10:00</div>
        <div class="text-3xl mt-4 tracking-[6px] uppercase" id="ovSub" style="color: color-mix(in srgb, var(--accent) 80%, white);">Berlangsung</div>
    </div>
</div>


<!-- Reusable analog clock SVG. clock.js clones it into the [data-analog] slot
     of whichever layout is mounted, then animates the hands. -->
<template id="tmpl-analog">
<svg id="analog" viewBox="-100 -100 200 200" class="drop-shadow-[0_10px_30px_rgba(0,0,0,0.7)]">
    <defs>
        <radialGradient id="face" cx="0" cy="-30" r="100" gradientUnits="userSpaceOnUse">
            <stop offset="0%"  stop-color="#ffffff"/>
            <stop offset="60%" stop-color="#f1f5f9"/>
            <stop offset="100%" stop-color="#cbd5e1"/>
        </radialGradient>
        <linearGradient id="bezel" x1="0" y1="-1" x2="0" y2="1">
            <stop offset="0%"  stop-color="var(--accent)"/>
            <stop offset="100%" stop-color="var(--primary)"/>
        </linearGradient>
        <filter id="handShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-opacity="0.4"/>
        </filter>
    </defs>
    <circle cx="0" cy="0" r="98" fill="url(#bezel)"/>
    <circle cx="0" cy="0" r="92" fill="var(--primary)"/>
    <circle cx="0" cy="0" r="86" fill="url(#face)"/>
    <g id="ticks" stroke="#0f172a" stroke-linecap="round"></g>
    <g id="numerals" fill="#0f172a" font-family="Inter, sans-serif" font-weight="800" font-size="13"
       text-anchor="middle" dominant-baseline="central"></g>
    <circle cx="0" cy="0" r="32" fill="none" stroke="var(--accent)" stroke-width="0.6" opacity="0.5"/>
    <g filter="url(#handShadow)">
        <g id="handH" transform="rotate(0)"><rect x="-2" y="-50" width="4" height="56" rx="2" fill="#0f172a"/></g>
        <g id="handM" transform="rotate(0)"><rect x="-1.5" y="-72" width="3" height="78" rx="1.5" fill="#0f172a"/></g>
        <g id="handS" transform="rotate(0)">
            <rect x="-0.6" y="-78" width="1.2" height="92" fill="#dc2626"/>
            <circle cx="0" cy="-50" r="3" fill="none" stroke="#dc2626" stroke-width="1.2"/>
        </g>
    </g>
    <circle cx="0" cy="0" r="4" fill="#0f172a"/>
    <circle cx="0" cy="0" r="1.6" fill="#dc2626"/>
</svg>
</template>


<!-- ============== LAYOUT: MINIMAL ============== -->
<template id="layout-minimal">
<div class="layout-minimal app-screen relative overflow-hidden" style="background:#05060d;">
    <div class="slideshow-host absolute inset-0"></div>
    <div class="absolute inset-0" style="background: linear-gradient(180deg, rgba(5,8,20,0.55) 0%, rgba(5,8,20,0.85) 60%, rgba(5,8,20,0.95) 100%);"></div>

    <div class="relative z-10 h-full grid" style="grid-template-rows: 80px 1fr auto;">
        <header class="flex items-center justify-between px-10">
            <div class="flex items-center gap-4">
                <div id="logoBox" class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl shadow-soft" style="background: var(--primary); color: var(--accent);">&#x262A;</div>
                <div>
                    <div class="text-xl font-bold tracking-tight">
                        <span style="color: var(--accent);" id="masjidPrefix">Masjid</span>
                        <span class="text-white" id="masjidName">Muslim Clock</span>
                    </div>
                    <div class="text-xs text-slate-400" id="masjidAddress">Jakarta, Indonesia</div>
                </div>
            </div>
            <div class="text-right glass-dark rounded-xl px-4 py-2">
                <div id="greg-date" class="text-sm font-bold text-white">—</div>
                <div id="hij-date" class="text-xs mt-0.5" style="color: var(--accent);">—</div>
            </div>
        </header>

        <main class="flex flex-col items-center justify-center px-10 gap-6">
            <div id="nextPill" class="glass-dark rounded-full px-6 py-2 flex items-center gap-3 shadow-soft">
                <span class="w-2 h-2 rounded-full animate-pulse" style="background: var(--accent);"></span>
                <span class="text-[11px] uppercase tracking-[3px] text-slate-300 font-semibold">Menuju</span>
                <span id="nextLabel" class="font-bold uppercase" style="color: var(--accent);">—</span>
                <span class="text-slate-500">·</span>
                <span id="nextCountdown" class="font-digital font-semibold text-white">--:--:--</span>
            </div>
            <div class="text-center">
                <div id="digital" class="font-digital font-black tracking-[0.06em] text-white leading-none drop-shadow-[0_8px_30px_rgba(0,0,0,0.8)]"
                     style="font-size: clamp(120px, 16vw, 220px);">
                    --<span style="color: var(--accent);">:</span>--<span style="color: var(--accent); font-size: 0.4em;" class="align-top ml-3">--</span>
                </div>
            </div>
            <div id="analogWrap" class="flex items-center gap-5">
                <div data-analog class="w-40 h-40"></div>
                <div class="text-left">
                    <div class="text-[10px] uppercase tracking-[3px] text-slate-400 font-semibold">Waktu</div>
                    <div class="text-sm font-semibold text-white">Lokal</div>
                </div>
            </div>
        </main>

        <section class="px-10 pb-8">
            <div class="grid grid-cols-6 gap-4">
                <div class="prayer prayer-card p-5 backdrop-blur-md" data-key="fajr">
                    <div class="label text-xs uppercase tracking-[3px] font-bold text-slate-300">Subuh</div>
                    <div class="font-digital text-4xl font-bold text-white tabular-nums mt-2" data-time>--:--</div>
                </div>
                <div class="prayer prayer-card p-5 backdrop-blur-md" data-key="sunrise">
                    <div class="label text-xs uppercase tracking-[3px] font-bold text-slate-300">Syuruq</div>
                    <div class="font-digital text-4xl font-bold text-white tabular-nums mt-2" data-time>--:--</div>
                </div>
                <div class="prayer prayer-card p-5 backdrop-blur-md" data-key="dhuhr">
                    <div class="label text-xs uppercase tracking-[3px] font-bold text-slate-300" id="dhuhrLabel">Dzuhur</div>
                    <div class="font-digital text-4xl font-bold text-white tabular-nums mt-2" data-time>--:--</div>
                </div>
                <div class="prayer prayer-card p-5 backdrop-blur-md" data-key="asr">
                    <div class="label text-xs uppercase tracking-[3px] font-bold text-slate-300">Ashar</div>
                    <div class="font-digital text-4xl font-bold text-white tabular-nums mt-2" data-time>--:--</div>
                </div>
                <div class="prayer prayer-card p-5 backdrop-blur-md" data-key="maghrib">
                    <div class="label text-xs uppercase tracking-[3px] font-bold text-slate-300">Maghrib</div>
                    <div class="font-digital text-4xl font-bold text-white tabular-nums mt-2" data-time>--:--</div>
                </div>
                <div class="prayer prayer-card p-5 backdrop-blur-md" data-key="isha">
                    <div class="label text-xs uppercase tracking-[3px] font-bold text-slate-300">Isya</div>
                    <div class="font-digital text-4xl font-bold text-white tabular-nums mt-2" data-time>--:--</div>
                </div>
            </div>
        </section>
    </div>
</div>
</template>


<!-- ============== LAYOUT: MOSQUE ============== -->
<template id="layout-mosque">
<div class="layout-mosque app-screen relative overflow-hidden ornament-pattern" style="background:#06091a;">
    <div class="absolute -top-32 -left-32 w-96 h-96 rounded-full opacity-30 blur-3xl pointer-events-none" style="background: var(--accent);"></div>
    <div class="absolute -bottom-32 -right-32 w-[500px] h-[500px] rounded-full opacity-25 blur-3xl pointer-events-none" style="background: var(--primary);"></div>

    <div class="relative z-10 h-full grid" style="grid-template-rows: 100px 1fr auto;">
        <header class="flex items-center justify-between px-10 border-b" style="border-color: color-mix(in srgb, var(--accent) 30%, transparent);">
            <div class="flex items-center gap-4">
                <div id="logoBox">
                    <svg viewBox="0 0 100 100" class="w-16 h-16">
                        <defs>
                            <linearGradient id="domeG" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stop-color="var(--accent)"/>
                                <stop offset="100%" stop-color="var(--primary)"/>
                            </linearGradient>
                        </defs>
                        <path d="M50 15 L52 25 Q70 30 70 55 L70 80 L30 80 L30 55 Q30 30 48 25 Z" fill="url(#domeG)"/>
                        <circle cx="50" cy="12" r="3" fill="var(--accent)"/>
                        <line x1="50" y1="9" x2="50" y2="3" stroke="var(--accent)" stroke-width="1.5"/>
                    </svg>
                </div>
                <div>
                    <div class="text-2xl font-extrabold tracking-tight text-white">
                        <span style="color: var(--accent);" id="masjidPrefix">Masjid</span>
                        <span id="masjidName">Muslim Clock</span>
                    </div>
                    <div class="text-sm text-slate-400 mt-0.5" id="masjidAddress">Jakarta, Indonesia</div>
                </div>
            </div>
            <div class="text-right">
                <div id="greg-date" class="text-base font-bold text-white">—</div>
                <div id="hij-date" class="text-sm font-semibold mt-0.5" style="color: var(--accent);">—</div>
            </div>
        </header>

        <main class="grid items-center px-10" style="grid-template-columns: 1fr auto;">
            <div class="text-center">
                <div class="text-[10px] uppercase tracking-[5px] text-slate-400 font-bold mb-2">Waktu Lokal</div>
                <div id="digital" class="font-digital font-black tracking-wide text-white leading-none drop-shadow-[0_10px_40px_rgba(0,0,0,0.8)]"
                     style="font-size: clamp(100px, 14vw, 200px);">
                    --<span style="color: var(--accent);">:</span>--<span style="color: var(--accent); font-size: 0.4em;" class="align-top ml-3">--</span>
                </div>
                <div id="nextPill" class="mt-6 inline-flex items-center gap-3 glass-dark rounded-full px-6 py-2 shadow-soft">
                    <span class="w-2 h-2 rounded-full animate-pulse" style="background: var(--accent);"></span>
                    <span class="text-xs uppercase tracking-[3px] text-slate-300 font-semibold">Menuju</span>
                    <span id="nextLabel" class="text-sm font-bold uppercase" style="color: var(--accent);">—</span>
                    <span class="text-slate-500">·</span>
                    <span id="nextCountdown" class="font-digital text-sm font-semibold text-white">--:--:--</span>
                </div>
            </div>
            <div id="analogWrap" class="pl-10"><div data-analog class="w-40 h-40"></div></div>
        </main>

        <section class="px-10 pb-8">
            <div class="grid grid-cols-6 gap-4">
                <div class="prayer prayer-grid-cell p-4 text-center backdrop-blur-md" data-key="fajr">
                    <div class="text-[10px] uppercase tracking-[3px] font-bold text-slate-400 mb-2">Subuh</div>
                    <div class="font-digital text-3xl font-bold text-white tabular-nums" data-time>--:--</div>
                </div>
                <div class="prayer prayer-grid-cell p-4 text-center backdrop-blur-md" data-key="sunrise">
                    <div class="text-[10px] uppercase tracking-[3px] font-bold text-slate-400 mb-2">Syuruq</div>
                    <div class="font-digital text-3xl font-bold text-white tabular-nums" data-time>--:--</div>
                </div>
                <div class="prayer prayer-grid-cell p-4 text-center backdrop-blur-md" data-key="dhuhr">
                    <div class="text-[10px] uppercase tracking-[3px] font-bold text-slate-400 mb-2" id="dhuhrLabel">Dzuhur</div>
                    <div class="font-digital text-3xl font-bold text-white tabular-nums" data-time>--:--</div>
                </div>
                <div class="prayer prayer-grid-cell p-4 text-center backdrop-blur-md" data-key="asr">
                    <div class="text-[10px] uppercase tracking-[3px] font-bold text-slate-400 mb-2">Ashar</div>
                    <div class="font-digital text-3xl font-bold text-white tabular-nums" data-time>--:--</div>
                </div>
                <div class="prayer prayer-grid-cell p-4 text-center backdrop-blur-md" data-key="maghrib">
                    <div class="text-[10px] uppercase tracking-[3px] font-bold text-slate-400 mb-2">Maghrib</div>
                    <div class="font-digital text-3xl font-bold text-white tabular-nums" data-time>--:--</div>
                </div>
                <div class="prayer prayer-grid-cell p-4 text-center backdrop-blur-md" data-key="isha">
                    <div class="text-[10px] uppercase tracking-[3px] font-bold text-slate-400 mb-2">Isya</div>
                    <div class="font-digital text-3xl font-bold text-white tabular-nums" data-time>--:--</div>
                </div>
            </div>
        </section>
    </div>
</div>
</template>


<!-- ============== LAYOUT: CINEMA ============== -->
<template id="layout-cinema">
<div class="layout-cinema app-screen grid bg-slate-950" style="grid-template-rows: 92px 1fr;">
    <header class="bg-gradient-to-r from-white via-slate-50 to-white text-slate-900 flex items-center justify-between px-8 border-b-4 shadow-soft" style="border-color: var(--accent);">
        <div class="flex items-center gap-4">
            <div id="logoBox" class="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl shadow-deep" style="background: var(--primary); color: var(--accent);">&#x262A;</div>
            <div>
                <h1 class="text-3xl font-extrabold leading-tight">
                    <span style="color: var(--accent);" id="masjidPrefix">Masjid</span>
                    <strong class="text-slate-900" id="masjidName">Muslim Clock</strong>
                </h1>
                <div class="text-sm text-slate-500" id="masjidAddress">Jakarta, Indonesia</div>
            </div>
        </div>
        <div class="text-right">
            <div id="greg-date" class="text-base font-bold text-slate-900">—</div>
            <div id="hij-date" class="text-sm font-semibold mt-0.5" style="color: var(--primary);">—</div>
        </div>
    </header>

    <main class="grid min-h-0" style="grid-template-columns: 1fr 380px 360px;">
        <section class="relative overflow-hidden bg-black">
            <div class="slideshow-host absolute inset-0"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent pointer-events-none"></div>
        </section>

        <section class="bg-gradient-to-b from-slate-900 to-slate-950 flex flex-col items-center justify-center px-6 py-6 gap-5">
            <div id="analogWrap"><div data-analog class="w-44 h-44"></div></div>
            <div class="flex flex-col items-center gap-2 w-full">
                <div class="glass shadow-deep rounded-2xl px-4 py-5 w-full text-center overflow-hidden">
                    <div id="digital" class="font-digital font-bold tracking-wider text-white leading-none whitespace-nowrap" style="font-size: 60px;">
                        --<span style="color: var(--accent);">:</span>--<span style="color: var(--accent); font-size: 0.45em;" class="align-top ml-2">--</span>
                    </div>
                </div>
                <div id="nextPill" class="text-center mt-1">
                    <div class="text-[10px] uppercase tracking-[3px] text-slate-400 font-semibold">Menuju Sholat</div>
                    <div class="mt-1.5">
                        <span id="nextLabel" class="text-base font-bold uppercase tracking-wider" style="color: var(--accent);">—</span>
                        <span class="text-slate-500 mx-1">·</span>
                        <span id="nextCountdown" class="font-digital text-lg font-semibold text-white">--:--:--</span>
                    </div>
                </div>
            </div>
        </section>

        <aside class="prayer-col flex flex-col">
            <div class="prayer flex-1 flex items-center justify-between px-5 border-b border-white/10" data-key="fajr">
                <div class="text-xl font-bold uppercase tracking-wider text-white">Subuh</div>
                <div class="font-digital text-3xl font-bold text-white tabular-nums" data-time>--:--</div>
